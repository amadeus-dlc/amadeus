# Walking-skeleton CI evidence for the formal-verification experiment (FR-8:
# TLA arm × D4 invalid-timestamp). Manually dispatched only — never on push or
# pull_request — so it cannot affect the ordinary CI bands.
#
# The job composes the fixture tree (checkout + the D4 arm-T face patch), runs
# the real TLC toolchain twice via scripts/formal-verif/run-skeleton-ci.ts, and
# uploads the two-row artifact plus raw TLC streams. macOS runner is required:
# the toolchain's process isolation is DarwinSandboxExecProvider (sandbox-exec).
name: Formal Verification Skeleton

on:
  workflow_dispatch:

jobs:
  skeleton:
    name: TLA x D4 skeleton (2 runs)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify JDK matches the fixed run profile
        run: |
          "$JAVA_HOME/bin/java" -version 2>&1 | tee java-version.txt
          grep -q 'openjdk version "26.0.1"' java-version.txt

      - name: Apply the D4 arm-T face patch (composed fixture tree)
        run: |
          git apply tests/formal-verif/fixtures/arm-t/d4-invalid-timestamp.patch
          git diff --stat

      - name: Run the skeleton cell twice (real TLC, sandbox-exec)
        run: bun scripts/formal-verif/run-skeleton-ci.ts skeleton-out

      - name: Upload skeleton artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-verif-skeleton
          path: |
            skeleton-out/skeleton-artifact.json
            skeleton-out/run-1/tlc-stdout.bin
            skeleton-out/run-1/tlc-stderr.bin
            skeleton-out/run-2/tlc-stdout.bin
            skeleton-out/run-2/tlc-stderr.bin
          if-no-files-found: error
