name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  mock:
    name: mock
    runs-on: ubuntu-latest
    env:
      AMADEUS_LLM_PROVIDER: mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # provenance:check は記録された commit を git show で参照するため、全履歴が必要である
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all tests
        run: npm run test:all
