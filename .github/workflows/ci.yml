name: CI

# Runs the same checks the contributor workflow documents (docs/reference/11-contributing.md):
# typecheck, lint, the dist/ + self-install drift guards, and the smoke+unit+integration
# test tier. The live integration tests self-skip when the claude CLI / model-provider
# substrate is absent (as it is on the runner), so this stays green without credentials.
on:
  push:
    branches: [main]
    # Snapshot-only merges must not create another snapshot review branch.
    paths-ignore:
      - metrics/**
  pull_request:

concurrency:
  # Main pushes must all run to completion: a cancelled main run skips the
  # coverage job, leaving no Codecov base report for that commit (#777).
  # cancel-in-progress: false alone is not enough — a concurrency group holds
  # at most one pending run, so a third consecutive push would still replace
  # (cancel) the queued one. Keying the group by SHA on main gives every push
  # its own group, so nothing can be cancelled or replaced. PR branches keep
  # the ref-keyed group with supersede cancellation.
  group: ci-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect CI changes
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CI-relevant changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          list_changed_files() {
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              git diff --name-only -z --no-renames "${BASE_SHA}...${HEAD_SHA}"
            elif [[ "${BASE_SHA}" =~ ^0+$ ]]; then
              git ls-tree -r --name-only -z "${HEAD_SHA}"
            else
              git diff --name-only -z --no-renames "${BASE_SHA}" "${HEAD_SHA}"
            fi
          }

          ci=false
          while IFS= read -r -d '' path; do
            case "${path}" in
              *.ts|*.tsx|*.mts|*.cts|\
              bun.lock|package.json|*/package.json|tsconfig*.json|biome.json|biome.jsonc|codecov.yml|.codecov.yml|\
              .github/workflows/ci.yml|\
              scripts/*|tests/*|packages/framework/*|packages/setup/*|\
              dist/*|.agents/*|.claude/*|.codex/*|.kiro/*|\
              AGENTS.md|CLAUDE.md)
                ci=true
                break
                ;;
            esac
          done < <(list_changed_files)

          printf 'ci=%s\n' "${ci}" >> "${GITHUB_OUTPUT}"

  check:
    name: typecheck - lint - drift - tests
    needs: changes
    if: ${{ needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit, both tsconfigs)
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Install lizard (CCN measurement, pinned)
        run: pip install lizard==1.23.0

      - name: Complexity gate (CCN baseline ratchet)
        run: bun tests/complexity-gate.ts --check

      - name: Dist drift guard (dist/ regenerates byte-identically from core/ + harness/)
        run: bun run dist:check

      - name: Self-install drift guard (.claude/.codex/.agents/CLAUDE.md in sync with dist/)
        run: bun run promote:self:check

      - name: Tests - smoke + unit + integration
        run: bun run test:ci

      - name: Upload dynamic test-size report (#684 Phase D / #699, advisory)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amadeus-test-size-report
          path: tests/logs/test-size-report.json
          if-no-files-found: warn
          retention-days: 14

  coverage:
    name: Coverage Report
    needs:
      - changes
      - check
    if: ${{ needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install lizard (CCN measurement, pinned - the suite's complexity-gate tests spawn it)
        run: pip install lizard==1.23.0

      - name: Generate coverage reports
        run: bun run coverage:ci

      - name: Project coverage gate
        run: bun tests/coverage-project-gate.ts --check

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amadeus-coverage-report
          path: |
            coverage/lcov.info
            coverage/html
            coverage/coverage-totals.json
            coverage/tests-totals.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          # No flags: the per-flag report path carried stale base values into
          # head reports (#791, despite carryforward defaulting to false), and
          # nothing here uses flag features. Flagless uploads bypass that path.
          name: amadeus-coverage

  # Main-only and intentionally outside ci-success: metrics publication must
  # never extend the pull-request critical path.
  metrics-snapshot:
    name: Metrics Snapshot
    needs:
      - changes
      - coverage
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.ci == 'true' && needs.coverage.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    concurrency:
      group: metrics-snapshot-main
      queue: max
      cancel-in-progress: false
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.METRICS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.METRICS_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install lizard (CCN measurement, pinned)
        run: pip install lizard==1.23.0

      - name: Download coverage totals
        uses: actions/download-artifact@v4
        with:
          name: amadeus-coverage-report
          path: coverage

      - name: Generate snapshot
        run: bun scripts/metrics-snapshot.ts --write

      - name: Get GitHub App user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Commit snapshot
        run: |
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add metrics/*.json
          git commit -m "chore(metrics): record snapshot"

      - name: Publish snapshot pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          branch="metrics/snapshot-${GITHUB_SHA:0:12}-${GITHUB_RUN_ATTEMPT}"
          git push origin "HEAD:refs/heads/$branch"
          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "メトリクススナップショットを記録する" \
            --body "main の ${GITHUB_SHA:0:12} に対応するコードメトリクスを自動記録します。")
          gh pr merge --auto --squash --delete-branch "$pr_url"
          {
            echo "## Metrics snapshot pull request"
            echo
            echo "[$pr_url]($pr_url)"
          } >> "$GITHUB_STEP_SUMMARY"

  codecov-status:
    name: Codecov Status
    runs-on: ubuntu-latest
    needs:
      - changes
      - coverage
    if: ${{ always() && needs.changes.outputs.ci == 'true' }}
    permissions:
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Wait for Codecov status checks
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          CODECOV_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          IS_PULL_REQUEST: ${{ github.event_name == 'pull_request' }}
        with:
          script: |
            const coverageResult = process.env.COVERAGE_RESULT;
            if (coverageResult !== "success") {
              throw new Error(`coverage failed or was skipped: ${coverageResult}`);
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = process.env.CODECOV_SHA;
            const requiredChecks = [];

            if (process.env.IS_PULL_REQUEST === "true") {
              requiredChecks.push("codecov/patch");
            } else {
              core.info("Skipping codecov/patch outside pull_request events");
            }

            for (const checkName of requiredChecks) {
              await waitForCheck(checkName);
            }

            async function waitForCheck(checkName) {
              for (let attempt = 1; attempt <= 60; attempt += 1) {
                const run = await latestCheckRun(checkName);

                if (run) {
                  core.info(`${checkName}: status=${run.status} conclusion=${run.conclusion || ""} url=${run.html_url}`);

                  if (run.status === "completed") {
                    if (run.conclusion === "success") {
                      return;
                    }

                    throw new Error(`${checkName} failed with conclusion=${run.conclusion}`);
                  }
                } else {
                  const status = await latestCommitStatus(checkName);
                  if (status) {
                    core.info(`${checkName}: state=${status.state} url=${status.target_url || ""}`);

                    if (status.state === "success") {
                      return;
                    }
                    if (status.state === "failure" || status.state === "error") {
                      throw new Error(`${checkName} failed with state=${status.state}`);
                    }
                  } else {
                    core.info(`${checkName}: waiting for Codecov status (${attempt}/60)`);
                  }
                }

                await new Promise((resolve) => setTimeout(resolve, 10000));
              }

              throw new Error(`${checkName} did not report within timeout`);
            }

            async function latestCheckRun(checkName) {
              const response = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                check_name: checkName,
                per_page: 100,
              });
              return response.data.check_runs
                .filter((checkRun) => checkRun.name === checkName)
                .sort((left, right) => {
                  const rightTime = Date.parse(right.started_at || right.created_at);
                  const leftTime = Date.parse(left.started_at || left.created_at);
                  return rightTime - leftTime;
                })[0];
            }

            async function latestCommitStatus(checkName) {
              const response = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref });
              return response.data.statuses.find((status) => status.context === checkName);
            }

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - changes
      - check
      - coverage
      - codecov-status
    if: ${{ always() }}
    steps:
      - name: All checks passed
        run: |
          require_result() {
            local name="$1"
            local actual="$2"
            if [[ "${actual}" != "success" ]]; then
              echo "${name} was ${actual}; expected success"
              exit 1
            fi
          }

          require_result "changes" "${{ needs.changes.result }}"

          case "${{ needs.changes.outputs.ci }}" in
            true)
              require_result "check" "${{ needs.check.result }}"
              require_result "coverage" "${{ needs.coverage.result }}"
              require_result "codecov-status" "${{ needs['codecov-status'].result }}"
              echo "All CI checks passed successfully"
              ;;
            false)
              echo "No CI-relevant changes; expensive checks skipped"
              ;;
            *)
              echo "changes returned an invalid CI decision"
              exit 1
              ;;
          esac
