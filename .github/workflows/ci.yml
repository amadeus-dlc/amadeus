name: CI

# Runs the same checks the contributor workflow documents (docs/reference/11-contributing.md):
# typecheck, lint, the dist/ + self-install drift guards, and the smoke+unit+integration
# test tier. The live integration tests self-skip when the claude CLI / model-provider
# substrate is absent (as it is on the runner), so this stays green without credentials.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    # Snapshot-only merges must not create another snapshot review branch.
    paths-ignore:
      - metrics/**
  pull_request:

concurrency:
  # Main pushes must all run to completion: a cancelled main run skips the
  # coverage job, leaving no metrics snapshot for that commit (originally
  # motivated by the external coverage service's base reports, #777; the
  # completeness guarantee is still wanted for snapshots).
  # cancel-in-progress: false alone is not enough — a concurrency group holds
  # at most one pending run, so a third consecutive push would still replace
  # (cancel) the queued one. Keying the group by SHA on main gives every push
  # its own group, so nothing can be cancelled or replaced. PR branches keep
  # the ref-keyed group with supersede cancellation.
  group: ci-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect CI changes
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.filter.outputs.full }}
      drift: ${{ steps.filter.outputs.drift }}
      coverage: ${{ steps.filter.outputs.coverage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CI-relevant changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${BASE_SHA}" ]]; then
            printf 'full=false\ndrift=false\ncoverage=false\n' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          list_changed_files() {
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              git diff --name-only -z --no-renames "${BASE_SHA}...${HEAD_SHA}"
            elif [[ "${BASE_SHA}" =~ ^0+$ ]]; then
              git ls-tree -r --name-only -z "${HEAD_SHA}"
            else
              git diff --name-only -z --no-renames "${BASE_SHA}" "${HEAD_SHA}"
            fi
          }

          list_changed_files | bash scripts/detect-ci-changes.sh >> "${GITHUB_OUTPUT}"

  check:
    name: typecheck - lint - drift - tests
    needs: changes
    if: ${{ needs.changes.outputs.full == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit, both tsconfigs)
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Install lizard (CCN measurement, pinned)
        run: pip install lizard==1.23.0

      - name: Complexity gate (CCN baseline ratchet)
        run: bun tests/complexity-gate.ts --check

      - name: Dist drift guard (dist/ regenerates byte-identically from core/ + harness/)
        run: bun run dist:check

      - name: Self-install drift guard (.claude/.codex/.agents/.cursor/.opencode/CLAUDE.md in sync with dist/)
        run: bun run promote:self:check

      - name: Tests - smoke + unit + integration
        run: bun run test:ci -- -P 4

      - name: Upload dynamic test-size report (#684 Phase D / #699, advisory)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amadeus-test-size-report
          path: tests/logs/test-size-report.json
          if-no-files-found: warn
          retention-days: 14

  drift-check:
    name: Dist and self-install drift
    needs: changes
    if: ${{ needs.changes.outputs.drift == 'true' && needs.changes.outputs.full != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dist drift guard
        run: bun run dist:check

      - name: Self-install drift guard
        run: bun run promote:self:check

  coverage-head:
    name: Coverage Report (head)
    needs: changes
    if: ${{ needs.changes.outputs.coverage == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install lizard (CCN measurement, pinned - the suite's complexity-gate tests spawn it)
        run: pip install lizard==1.23.0

      - name: Generate coverage reports
        run: bun run coverage:ci -- -P 4

      - name: Project coverage gate
        run: bun tests/coverage-project-gate.ts --check

      - name: Patch coverage gate
        if: ${{ github.event_name == 'pull_request' }}
        env:
          AMADEUS_PATCH_BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          bun tests/coverage-patch-gate.ts --check | tee /tmp/patch-gate-summary.txt
          {
            echo "## Patch Coverage Gate"
            echo
            echo '```'
            cat /tmp/patch-gate-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amadeus-coverage-report
          path: |
            coverage/lcov.info
            coverage/html
            coverage/coverage-totals.json
            coverage/tests-totals.json
          if-no-files-found: warn
          retention-days: 14

  coverage-base:
    name: Coverage Report (base)
    needs: changes
    if: ${{ needs.changes.outputs.coverage == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up bun
        if: ${{ github.event_name == 'pull_request' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Resolve merge-base for the relative coverage gate
        if: ${{ github.event_name == 'pull_request' }}
        id: merge-base
        run: |
          set -euo pipefail
          mb="$(git merge-base "origin/${{ github.event.pull_request.base.ref }}" HEAD)"
          echo "sha=$mb" >> "$GITHUB_OUTPUT"

      - name: Restore base coverage cache
        if: ${{ github.event_name == 'pull_request' }}
        id: base-cache
        uses: actions/cache@v4
        with:
          path: /tmp/base-coverage-totals.json
          key: relative-coverage-base-${{ steps.merge-base.outputs.sha }}

      - name: Measure base coverage
        if: ${{ github.event_name == 'pull_request' && steps.base-cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          git checkout --detach "${{ steps.merge-base.outputs.sha }}"
          bun install --frozen-lockfile
          status=0
          bun run coverage:ci -- -P 4 || status=$?
          if [[ ! -s coverage/lcov.info || ! -s coverage/coverage-totals.json ]]; then
            echo "::error::base coverage artifacts incomplete (coverage:ci exit ${status}); refusing to compare"
            exit 1
          fi
          if [[ "${status}" -ne 0 ]]; then
            echo "::warning::base suite verdict failed (exit ${status}) but coverage artifacts are complete; proceeding verdict-independent per E-CV2 D4"
          fi
          cp coverage/coverage-totals.json /tmp/base-coverage-totals.json

      - name: Upload base coverage totals
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: amadeus-base-coverage-totals
          path: /tmp/base-coverage-totals.json
          if-no-files-found: error
          retention-days: 1

      - name: Base coverage not required
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "Base coverage is only required for pull requests"

  coverage:
    name: Coverage Report
    needs:
      - changes
      - coverage-head
      - coverage-base
    if: ${{ always() && needs.changes.outputs.coverage == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require coverage jobs
        run: |
          test "${{ needs.coverage-head.result }}" = success
          test "${{ needs.coverage-base.result }}" = success

      - name: Checkout
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4

      - name: Set up bun
        if: ${{ github.event_name == 'pull_request' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Download head coverage totals
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/download-artifact@v4
        with:
          name: amadeus-coverage-report
          path: coverage

      - name: Download base coverage totals
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/download-artifact@v4
        with:
          name: amadeus-base-coverage-totals
          path: /tmp

      - name: Relative coverage gate (head vs merge-base)
        if: ${{ github.event_name == 'pull_request' }}
        env:
          AMADEUS_COVERAGE_PROJECT_BASELINE: /tmp/base-coverage-totals.json
        run: |
          set -euo pipefail
          bun tests/coverage-project-gate.ts --check | tee /tmp/relative-gate-summary.txt
          {
            echo "## Relative Coverage Gate (head vs merge-base)"
            echo
            echo '```'
            cat /tmp/relative-gate-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"


  # Main-only and intentionally outside ci-success: metrics publication must
  # never extend the pull-request critical path.
  metrics-snapshot:
    name: Metrics Snapshot
    needs:
      - changes
      - coverage
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.coverage == 'true' && needs.coverage.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    concurrency:
      group: metrics-snapshot-main
      queue: max
      cancel-in-progress: false
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.METRICS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.METRICS_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install lizard (CCN measurement, pinned)
        run: pip install lizard==1.23.0

      - name: Download coverage totals
        uses: actions/download-artifact@v4
        with:
          name: amadeus-coverage-report
          path: coverage

      - name: Generate snapshot
        run: bun scripts/metrics-snapshot.ts --write

      - name: Prune old snapshots
        run: bun scripts/metrics-retention.ts --apply

      - name: Get GitHub App user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Commit snapshot
        run: |
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add -A metrics/
          git commit -m "chore(metrics): record snapshot"

      - name: Publish snapshot pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          branch="metrics/snapshot-${GITHUB_SHA:0:12}-${GITHUB_RUN_ATTEMPT}"
          git push origin "HEAD:refs/heads/$branch"
          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "メトリクススナップショットを記録する" \
            --body "main の ${GITHUB_SHA:0:12} に対応するコードメトリクスを自動記録します。")
          gh pr merge --auto --squash --delete-branch "$pr_url"
          {
            echo "## Metrics snapshot pull request"
            echo
            echo "[$pr_url]($pr_url)"
          } >> "$GITHUB_STEP_SUMMARY"

  # U4 formal-model-check begin
  formal-model-check:
    name: Formal model check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: formal-checkout
        continue-on-error: true
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Bun
        id: formal-setup-bun
        if: always()
        continue-on-error: true
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Run fixed Docker model-check acceptance
        id: formal-acceptance
        if: always()
        continue-on-error: true
        env:
          CHECKOUT_OUTCOME: ${{ steps.formal-checkout.outcome }}
          BUN_OUTCOME: ${{ steps.formal-setup-bun.outcome }}
          EVIDENCE_ROOT: ${{ runner.temp }}/amadeus-formal-model-check
        run: |
          set -uo pipefail
          mkdir -p "${EVIDENCE_ROOT}"
          if [[ "${CHECKOUT_OUTCOME}" != "success" || "${BUN_OUTCOME}" != "success" ]]; then
            printf '{"schema":"amadeus.ci-model-check-bootstrap-failure.v1","step":"workflow-bootstrap","errorCode":"ACTION_BOOTSTRAP","checkoutOutcome":"%s","bunOutcome":"%s"}\n' \
              "${CHECKOUT_OUTCOME}" "${BUN_OUTCOME}" > "${EVIDENCE_ROOT}/bootstrap-failure.json"
            echo "exit-code=2" >> "${GITHUB_OUTPUT}"
            exit 2
          fi
          set +e
          bun scripts/formal-verif/run-model-check-ci.ts run --root "${EVIDENCE_ROOT}"
          status=$?
          set -e
          echo "exit-code=${status}" >> "${GITHUB_OUTPUT}"
          exit "${status}"

      - name: Verify terminal evidence
        id: formal-verify
        if: always()
        continue-on-error: true
        env:
          ACCEPTANCE_EXIT: ${{ steps.formal-acceptance.outputs.exit-code }}
          EVIDENCE_ROOT: ${{ runner.temp }}/amadeus-formal-model-check
        run: |
          set -euo pipefail
          test "${ACCEPTANCE_EXIT:-2}" -eq 0
          bun scripts/formal-verif/run-model-check-ci.ts verify --root "${EVIDENCE_ROOT}"

      - name: Upload formal model-check evidence
        id: formal-upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: formal-model-check-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/amadeus-formal-model-check
          if-no-files-found: error
          retention-days: 14

      - name: Publish terminal state
        id: formal-terminal
        if: always()
        env:
          CHECKOUT_OUTCOME: ${{ steps.formal-checkout.outcome }}
          BUN_OUTCOME: ${{ steps.formal-setup-bun.outcome }}
          ACCEPTANCE_EXIT: ${{ steps.formal-acceptance.outputs.exit-code }}
          VERIFY_OUTCOME: ${{ steps.formal-verify.outcome }}
          UPLOAD_OUTCOME: ${{ steps.formal-upload.outcome }}
        run: |
          set -euo pipefail
          if [[ "${CHECKOUT_OUTCOME}" != "success" || "${BUN_OUTCOME}" != "success" ]]; then
            echo "bootstrap failure"
            exit 2
          fi
          case "${ACCEPTANCE_EXIT:-2}" in
            2) echo "model-check harness failure"; exit 2 ;;
            0|1) ;;
            *) echo "invalid model-check exit"; exit 2 ;;
          esac
          if [[ "${VERIFY_OUTCOME}" != "success" ]]; then
            echo "artifact verification failure"
            exit 2
          fi
          if [[ "${UPLOAD_OUTCOME}" != "success" ]]; then
            echo "artifact upload failure"
            exit 2
          fi
          if [[ "${ACCEPTANCE_EXIT}" -eq 1 ]]; then
            echo "model counterexample detected"
            exit 1
          fi
          echo "formal model check completed with NOT_DETECTED"
  # U4 formal-model-check end

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - changes
      - check
      - drift-check
      - coverage
    if: ${{ always() }}
    steps:
      - name: All checks passed
        run: |
          require_result() {
            local name="$1"
            local actual="$2"
            if [[ "${actual}" != "success" ]]; then
              echo "${name} was ${actual}; expected success"
              exit 1
            fi
          }

          require_result "changes" "${{ needs.changes.result }}"

          ran=false

          case "${{ needs.changes.outputs.full }}" in
            true)
              require_result "check" "${{ needs.check.result }}"
              ran=true
              ;;
            false)
              ;;
            *)
              echo "changes returned an invalid full decision"
              exit 1
              ;;
          esac

          case "${{ needs.changes.outputs.drift }}" in
            true)
              if [[ "${{ needs.changes.outputs.full }}" != "true" ]]; then
                require_result "drift-check" "${{ needs.drift-check.result }}"
              fi
              ran=true
              ;;
            false)
              ;;
            *)
              echo "changes returned an invalid drift decision"
              exit 1
              ;;
          esac

          case "${{ needs.changes.outputs.coverage }}" in
            true)
              require_result "coverage" "${{ needs.coverage.result }}"
              ran=true
              ;;
            false)
              ;;
            *)
              echo "changes returned an invalid coverage decision"
              exit 1
              ;;
          esac

          if [[ "${ran}" == "true" ]]; then
            echo "All applicable CI checks passed successfully"
          else
            echo "No CI-relevant changes; validation skipped"
          fi
