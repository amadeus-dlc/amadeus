name: CI

# Runs the same checks the contributor workflow documents (docs/reference/11-contributing.md):
# typecheck, lint, the dist/ + self-install drift guards, and the smoke+unit+integration
# test tier. The live integration tests self-skip when the claude CLI / model-provider
# substrate is absent (as it is on the runner), so this stays green without credentials.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: typecheck · lint · drift · tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit, both tsconfigs)
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Dist drift guard (dist/ regenerates byte-identically from core/ + harness/)
        run: bun run dist:check

      - name: Self-install drift guard (.claude/.codex/.agents/CLAUDE.md in sync with dist/)
        run: bun run promote:self:check

      - name: Tests — smoke + unit + integration
        run: bun run test:ci

      - name: Upload dynamic test-size report (#684 Phase D / #699, advisory)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amadeus-test-size-report
          path: tests/logs/test-size-report.json
          if-no-files-found: warn
          retention-days: 14

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs:
      - check
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate coverage reports
        run: bun run coverage:ci

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amadeus-coverage-report
          path: |
            coverage/lcov.info
            coverage/html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          flags: ci
          name: amadeus-coverage

  codecov-status:
    name: Codecov Status
    runs-on: ubuntu-latest
    needs:
      - coverage
    if: ${{ always() }}
    permissions:
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Wait for Codecov status checks
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          CODECOV_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          IS_PULL_REQUEST: ${{ github.event_name == 'pull_request' }}
        with:
          script: |
            const coverageResult = process.env.COVERAGE_RESULT;
            if (coverageResult !== "success") {
              throw new Error(`coverage failed or was skipped: ${coverageResult}`);
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = process.env.CODECOV_SHA;
            const requiredChecks = [];

            if (process.env.IS_PULL_REQUEST === "true") {
              requiredChecks.push("codecov/patch");
            } else {
              core.info("Skipping codecov/patch outside pull_request events");
            }

            for (const checkName of requiredChecks) {
              await waitForCheck(checkName);
            }

            async function waitForCheck(checkName) {
              for (let attempt = 1; attempt <= 60; attempt += 1) {
                const run = await latestCheckRun(checkName);

                if (run) {
                  core.info(`${checkName}: status=${run.status} conclusion=${run.conclusion || ""} url=${run.html_url}`);

                  if (run.status === "completed") {
                    if (run.conclusion === "success") {
                      return;
                    }

                    throw new Error(`${checkName} failed with conclusion=${run.conclusion}`);
                  }
                } else {
                  const status = await latestCommitStatus(checkName);
                  if (status) {
                    core.info(`${checkName}: state=${status.state} url=${status.target_url || ""}`);

                    if (status.state === "success") {
                      return;
                    }
                    if (status.state === "failure" || status.state === "error") {
                      throw new Error(`${checkName} failed with state=${status.state}`);
                    }
                  } else {
                    core.info(`${checkName}: waiting for Codecov status (${attempt}/60)`);
                  }
                }

                await new Promise((resolve) => setTimeout(resolve, 10000));
              }

              throw new Error(`${checkName} did not report within timeout`);
            }

            async function latestCheckRun(checkName) {
              const response = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                check_name: checkName,
                per_page: 100,
              });
              return response.data.check_runs
                .filter((checkRun) => checkRun.name === checkName)
                .sort((left, right) => {
                  const rightTime = Date.parse(right.started_at || right.created_at);
                  const leftTime = Date.parse(left.started_at || left.created_at);
                  return rightTime - leftTime;
                })[0];
            }

            async function latestCommitStatus(checkName) {
              const response = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref });
              return response.data.statuses.find((status) => status.context === checkName);
            }

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - check
      - coverage
      - codecov-status
    if: ${{ always() }}
    steps:
      - name: All checks passed
        run: |
          require_result() {
            local name="$1"
            local actual="$2"
            if [[ "${actual}" != "success" ]]; then
              echo "${name} was ${actual}; expected success"
              exit 1
            fi
          }

          require_result "check" "${{ needs.check.result }}"
          require_result "coverage" "${{ needs.coverage.result }}"
          require_result "codecov-status" "${{ needs['codecov-status'].result }}"
          echo "All CI checks passed successfully"
