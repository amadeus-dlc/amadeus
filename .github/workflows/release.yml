name: Release @amadeus-dlc/setup

# Publishes packages/setup to npm with provenance. Two entry points:
#   - push of a `setup-vX.Y.Z` tag (the setup package's own semver axis,
#     independent of the framework's `vX.Y.Z` tags that the installer
#     fetches distributions from)
#   - workflow_dispatch, with an optional dry-run that exercises every
#     step (gates, build, real-network E2E, `npm publish --dry-run`)
#     without touching the registry — no NPM_TOKEN required.
# The same five quality gates as ci.yml run here so a release never
# depends on trusting an earlier run.
on:
  push:
    tags: ['setup-v*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run everything but publish with --dry-run (no token needed)'
        type: boolean
        default: false

concurrency:
  group: release-setup
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  release:
    name: gates · build · verify · publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up node (npm publish + provenance)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit, both tsconfigs)
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Dist drift guard
        run: bun run dist:check

      - name: Self-install drift guard
        run: bun run promote:self:check

      - name: Tests — smoke + unit + integration
        run: bash tests/run-tests.sh --ci

      - name: Build dist/cli.js (fresh)
        working-directory: packages/setup
        run: bun run build

      - name: Real-network E2E (distribution path against live GitHub)
        env:
          AMADEUS_SETUP_E2E_NETWORK: '1'
        run: bun test tests/e2e/setup-install.test.ts

      - name: Version guard (tag must match packages/setup version)
        if: github.ref_type == 'tag'
        run: |
          tag_version="${GITHUB_REF_NAME#setup-v}"
          pkg_version="$(node -p "require('./packages/setup/package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag setup-v${tag_version} does not match packages/setup version ${pkg_version}"
            exit 1
          fi

      - name: Publish to npm
        working-directory: packages/setup
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          args=(--access public)
          case "$version" in
            *-*) args+=(--tag next) ;; # prerelease never touches `latest`
          esac
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}" = "true" ]; then
            npm publish --dry-run "${args[@]}"
          else
            npm publish --provenance "${args[@]}"
          fi

      - name: Post-publish smoke (npx resolves and prints help)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: |
          version="$(node -p "require('./packages/setup/package.json').version")"
          for i in 1 2 3 4 5; do
            if npx -y "@amadeus-dlc/setup@${version}"; then
              echo "smoke OK on attempt ${i}"
              exit 0
            fi
            echo "registry not ready yet (attempt ${i}); retrying in 30s"
            sleep 30
          done
          echo "::error::post-publish smoke failed after 5 attempts"
          exit 1
