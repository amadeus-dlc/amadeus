name: Release @amadeus-dlc/setup

# One-button release. The repo uses a single `vX.Y.Z` tag axis driven by
# packages/setup's version (starting at v0.1.0): the tag is both the npm
# release of @amadeus-dlc/setup and the GitHub tag the installer resolves
# framework distributions from. Release notes are generated into the
# GitHub Release — there is no CHANGELOG file.
#
# Main entry point is workflow_dispatch: pick a bump level and release-it
# bumps the version, commits, tags `vX.Y.Z`, and pushes directly to main
# (an explicit, team-recorded exception to the PR rule — the bump commit
# is a one-line version change). The same run then creates the GitHub
# Release with auto-generated notes (softprops/action-gh-release), builds
# dist/cli.js fresh, publishes to npm with provenance, and smoke-checks
# via npx. Everything happens in one run because tags/commits pushed with
# GITHUB_TOKEN never trigger other workflows.
#
# Bootstrap: when the repo has no v* tag yet, a dispatch skips the bump
# and releases the committed version as-is (release-it --no-increment,
# tag only) — the first run creates the tag matching the current version
# with no manual tagging. A `v*` tag push remains as a fallback entry
# point: it skips the bump and runs notes -> build -> publish -> smoke.
# workflow_dispatch with dry-run rehearses (release-it --dry-run +
# npm publish --dry-run) without pushing or publishing anything.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump level for packages/setup'
        type: choice
        options: [patch, minor, major]
        default: patch
      dry-run:
        description: 'Rehearse: no commit/tag/push, npm publish --dry-run'
        type: boolean
        default: false

concurrency:
  group: release-setup
  cancel-in-progress: false

permissions:
  contents: write # release-it pushes the bump commit + tag; gh-release creates the release
  id-token: write # npm provenance

jobs:
  release:
    name: bump · tag · notes · publish · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (full history + tags for guards and the bootstrap check)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up node (npm publish + provenance)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Guard — dispatch must run on main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::run this workflow on main (got ${GITHUB_REF})"
          exit 1

      - name: Guard — tag matches version and commit is on main
        if: github.ref_type == 'tag'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./packages/setup/package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag v${tag_version} does not match packages/setup version ${pkg_version}"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tagged commit ${GITHUB_SHA} is not on main"
            exit 1
          fi

      - name: Bump, commit, tag, push (release-it)
        if: github.event_name == 'workflow_dispatch'
        working-directory: packages/setup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git tag --list 'v*')" ]; then
            # Bootstrap: no v* tag exists yet — release the committed version
            # as-is (tag only, no bump commit).
            echo "no v* tags found — bootstrapping the first release without a bump"
            args=(--no-increment --no-git.commit --ci)
          else
            args=(${{ inputs.bump }} --ci)
          fi
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          npx release-it "${args[@]}"

      - name: Resolve version
        id: version
        run: echo "version=$(node -p "require('./packages/setup/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with generated notes
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      - name: Build dist/cli.js (fresh)
        working-directory: packages/setup
        run: bun run build

      - name: Publish to npm
        working-directory: packages/setup
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          args=(--access public)
          case "$version" in
            *-*) args+=(--tag next) ;; # prerelease never touches `latest`
          esac
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}" = "true" ]; then
            npm publish --dry-run "${args[@]}"
          else
            npm publish --provenance "${args[@]}"
          fi

      - name: Post-publish smoke (npx resolves and prints help)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: |
          version="${{ steps.version.outputs.version }}"
          for i in 1 2 3 4 5; do
            if npx -y "@amadeus-dlc/setup@${version}"; then
              echo "smoke OK on attempt ${i}"
              exit 0
            fi
            echo "registry not ready yet (attempt ${i}); retrying in 30s"
            sleep 30
          done
          echo "::error::post-publish smoke failed after 5 attempts"
          exit 1
