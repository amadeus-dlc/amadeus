name: Release @amadeus-dlc/setup

# Publishes packages/setup to npm with provenance. Release-specific steps
# only — the code being released is already gated: every commit on main
# passed the five CI quality gates (ci.yml) at PR time, so this workflow
# does not re-run tests. What remains is what only a release needs:
#   - guard: the tag must match packages/setup's version, and the tagged
#     commit must be reachable from main (no releasing stray branches)
#   - build: dist/cli.js is not committed, so it is built fresh here
#   - publish: npm publish --provenance (prereleases auto-select --tag next)
#   - smoke: the published version resolves and prints help via npx
# Entry points: push of a `setup-vX.Y.Z` tag (the setup package's own
# semver axis, independent of the framework's `vX.Y.Z` tags), or
# workflow_dispatch with an optional dry-run (`npm publish --dry-run`,
# no NPM_TOKEN required).
on:
  push:
    tags: ['setup-v*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run everything but publish with --dry-run (no token needed)'
        type: boolean
        default: false

concurrency:
  group: release-setup
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  release:
    name: guard · build · publish · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (full history for the on-main guard)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up node (npm publish + provenance)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Guard — tag matches version and commit is on main
        if: github.ref_type == 'tag'
        run: |
          tag_version="${GITHUB_REF_NAME#setup-v}"
          pkg_version="$(node -p "require('./packages/setup/package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag setup-v${tag_version} does not match packages/setup version ${pkg_version}"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tagged commit ${GITHUB_SHA} is not on main — releases only ship CI-gated main history"
            exit 1
          fi

      - name: Build dist/cli.js (fresh)
        working-directory: packages/setup
        run: bun run build

      - name: Publish to npm
        working-directory: packages/setup
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          args=(--access public)
          case "$version" in
            *-*) args+=(--tag next) ;; # prerelease never touches `latest`
          esac
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}" = "true" ]; then
            npm publish --dry-run "${args[@]}"
          else
            npm publish --provenance "${args[@]}"
          fi

      - name: Post-publish smoke (npx resolves and prints help)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: |
          version="$(node -p "require('./packages/setup/package.json').version")"
          for i in 1 2 3 4 5; do
            if npx -y "@amadeus-dlc/setup@${version}"; then
              echo "smoke OK on attempt ${i}"
              exit 0
            fi
            echo "registry not ready yet (attempt ${i}); retrying in 30s"
            sleep 30
          done
          echo "::error::post-publish smoke failed after 5 attempts"
          exit 1
